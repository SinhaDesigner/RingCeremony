<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}

</style>

</head>

<body>

<video id="doorVideo" playsinline>
<source src="door.mp4" type="video/mp4">
</video>

<script>

let video = document.getElementById("doorVideo");
let started = false;

/* SCREEN TAP / CLICK */

document.body.addEventListener("pointerdown", function(){

if(!started){
video.play();
started = true;
}

});

/* VIDEO END → NEXT PAGE */

video.onended = function(){
window.location.href = "second.html";
};

</script>

</body>

</html>
