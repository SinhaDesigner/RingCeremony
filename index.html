<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}

</style>

</head>

<body>

<video id="doorVideo" playsinline>
<source src="door.mp4" type="video/mp4">
</video>
  
<script>

let video = document.getElementById("doorVideo");

/* Single Click (Laptop) */

video.addEventListener("click", function(){
video.play();
});

/* Single Tap (Mobile) */

video.addEventListener("touchstart", function(){
video.play();
});

/* Video End → Next Page */

video.onended = function(){
window.location.href = "second.html";
};

</script>
  

</body>
</html>
