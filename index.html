<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}
</style>

</head>

<body>

<video id="doorVideo" playsinline>
<source src="door.mp4" type="video/mp4">
</video>

<script>

let video = document.getElementById("doorVideo");

/* SINGLE TAP / CLICK */

video.addEventListener("pointerdown", function(){
video.play();
});

/* VIDEO END → NEXT PAGE */

video.onended = function(){
window.location.href = "second.html";
};

</script>

</body>
</html>
