<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Wedding Invite</title>

<style>

body{
margin:0;
padding:0;
background:white;
overflow-x:hidden;
touch-action:manipulation;
}

.section{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

video{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* MOBILE / DESKTOP VIDEO CONTROL */

.mobile-video{
display:none;
}

@media(max-width:768px){

.desktop-video{
display:none;
}

.mobile-video{
display:block;
}

}

</style>

</head>


<body>

<!-- DOOR VIDEO -->

<div class="section">

<video id="doorVideo" muted playsinline preload="auto">

<source src="door.mp4" type="video/mp4">

</video>

</div>


<!-- DESKTOP VIDEO 1 -->

<div class="section desktop-video">

<video muted playsinline preload="none">

<source src="video1.mp4" type="video/mp4">

</video>

</div>


<!-- DESKTOP VIDEO 2 -->

<div class="section desktop-video">

<video muted playsinline preload="none">

<source src="video2.mp4" type="video/mp4">

</video>

</div>


<!-- MOBILE VIDEO 1 -->

<div class="section mobile-video">

<video muted playsinline preload="none">

<source src="video1-mobile.mp4" type="video/mp4">

</video>

</div>


<!-- MOBILE VIDEO 2 -->

<div class="section mobile-video">

<video muted playsinline preload="none">

<source src="video2-mobile.mp4" type="video/mp4">

</video>

</div>



<script>

let door = document.getElementById("doorVideo");

/* DESKTOP DOUBLE CLICK */

door.addEventListener("dblclick", function(e){

e.preventDefault();
door.play();

});


/* MOBILE DOUBLE TAP */

let lastTap = 0;

door.addEventListener("touchend", function(e){

let currentTime = new Date().getTime();
let tapLength = currentTime - lastTap;

if (tapLength < 300 && tapLength > 0){

e.preventDefault();
door.play();

}

lastTap = currentTime;

});


/* VIDEO END → AUTO SCROLL */

door.onended = function(){

window.scrollTo({
top: window.innerHeight,
behavior: "smooth"
});

};

</script>

</body>
</html>
