<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}

</style>

</head>

<body>

<video id="doorVideo" playsinline>
<source src="door.mp4" type="video/mp4">
</video>

<script>

let video = document.getElementById("doorVideo");

/* Laptop Double Click */

video.addEventListener("dblclick", function(){
video.play();
});

/* Mobile Double Tap */

let lastTap = 0;

video.addEventListener("touchend", function(){

let currentTime = new Date().getTime();
let tapLength = currentTime - lastTap;

if(tapLength < 300 && tapLength > 0){
video.play();
}

lastTap = currentTime;

});

/* Video End → Next Page */

video.onended = function(){
window.location.href = "second.html";
};

</script>

</body>
</html>
