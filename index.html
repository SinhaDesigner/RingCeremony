<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Door</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

video{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

</style>
</head>

<body>

<video id="doorVideo" autoplay playsinline>
<source src="door.mp4" type="video/mp4">
</video>

<script>

let door = document.getElementById("doorVideo");
let finished = false;

door.onended = function(){
finished = true;
};

door.ondblclick = function(){

if(finished){
door.currentTime = 0;
door.play();

door.onended = function(){
window.location.href = "second.html";
};
}

};

</script>

</body>
</html>
