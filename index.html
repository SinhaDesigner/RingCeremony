<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Door</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

video{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

</style>
</head>

<body>

<video id="doorVideo" playsinline>
<source src="door.mp4" type="video/mp4">
</video>

<script>

let video = document.getElementById("doorVideo");

/* DOUBLE CLICK (Laptop) */
video.addEventListener("dblclick", function(){
video.play();
});

/* DOUBLE TAP (Mobile) */

let lastTap = 0;

video.addEventListener("touchend", function(){

let currentTime = new Date().getTime();
let tapLength = currentTime - lastTap;

if(tapLength < 300 && tapLength > 0){
video.play();
}

lastTap = currentTime;

});

/* VIDEO END → NEXT PAGE */

video.onended = function(){
window.location.href = "second.html";
};

</script>

</body>

</html>
