<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Second Page</title>

<style>

body{
margin:0;
padding:0;
background:black;
}

/* VIDEO SECTION */

.section{
width:100%;
height:100vh;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
}

/* MOBILE & DESKTOP CONTROL */

.mobile-video{
display:none;
}

.desktop-video{
display:block;
}

@media(max-width:768px){

.desktop-video{
display:none;
}

.mobile-video{
display:block;
}

}

</style>

</head>


<body>

<!-- DESKTOP VIDEO 1 -->
<div class="section desktop-video">

<video autoplay muted loop playsinline>

<source src="video1.mp4" type="video/mp4">

</video>

</div>


<!-- DESKTOP VIDEO 2 -->
<div class="section desktop-video">

<video autoplay muted loop playsinline>

<source src="video2.mp4" type="video/mp4">

</video>

</div>


<!-- MOBILE VIDEO 1 -->
<div class="section mobile-video">

<video autoplay muted loop playsinline>

<source src="video1-mobile.mp4" type="video/mp4">

</video>

</div>


<!-- MOBILE VIDEO 2 -->
<div class="section mobile-video">

<video autoplay muted loop playsinline>

<source src="video2-mobile.mp4" type="video/mp4">

</video>

</div>

</body>

</html>
