<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring Ceremony</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
overflow-x:hidden;
}

/* video section */
.section{
width:100%;
min-height:100vh;
}

/* video style */
video{
width:100%;
height:100vh;
object-fit:cover;
display:block;
}

/* mobile video hidden */
.mobile-video{
display:none;
}

/* mobile screen */
@media (max-width:768px){

.desktop-video{
display:none;
}

.mobile-video{
display:block;
}

video{
height:auto;
}

}

</style></head><body><!-- FIRST VIDEO --><div class="section"><video class="desktop-video" autoplay muted playsinline>
<source src="video1-desktop.mp4" type="video/mp4">
</video><video class="mobile-video" autoplay muted playsinline>
<source src="video1-mobile.mp4" type="video/mp4">
</video></div><!-- SECOND VIDEO --><div class="section"><video class="desktop-video" autoplay muted playsinline>
<source src="video2-desktop.mp4" type="video/mp4">
</video><video class="mobile-video" autoplay muted playsinline>
<source src="video2-mobile.mp4" type="video/mp4">
</video></div></body>
</html>
