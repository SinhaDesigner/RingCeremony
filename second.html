<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videos</title>

<style>

body{
margin:0;
background:black;
}

video{
width:100%;
display:block;
}

/* desktop */

.desktop{
display:block;
}

.mobile{
display:none;
}

/* mobile */

@media(max-width:768px){

.desktop{
display:none;
}

.mobile{
display:block;
}

}

</style>

</head>

<body>

<!-- Desktop -->

<video class="desktop" autoplay playsinline>
<source src="video1.mp4" type="video/mp4">
</video>

<video class="desktop" autoplay playsinline>
<source src="video2.mp4" type="video/mp4">
</video>

<!-- Mobile -->

<video class="mobile" autoplay playsinline>
<source src="video1-mobile.mp4" type="video/mp4">
</video>

<video class="mobile" autoplay playsinline>
<source src="video2-mobile.mp4" type="video/mp4">
</video>

</body>

</html>
