<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

video{
width:100vw;
height:50vh;
object-fit:cover;
display:block;
}

/* Desktop */

.desktop{
display:block;
}

.mobile{
display:none;
}

/* Mobile */

@media(max-width:768px){

.desktop{
display:none;
}

.mobile{
display:block;
}

}

</style>

</head>

<body>

<!-- Desktop Videos -->

<video class="desktop" autoplay muted playsinline>
<source src="video1.mp4" type="video/mp4">
</video>

<video class="desktop" autoplay muted playsinline>
<source src="video2.mp4" type="video/mp4">
</video>


<!-- Mobile Videos -->

<video class="mobile" autoplay muted playsinline>
<source src="video1-mobile.mp4" type="video/mp4">
</video>

<video class="mobile" autoplay muted playsinline>
<source src="video2-mobile.mp4" type="video/mp4">
</video>

</body>
</html>
