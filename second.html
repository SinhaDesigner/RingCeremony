<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Video Section</title>

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        }

        body{
        background:black;
        }

        /* video section */
        .section{
        width:100%;
        }

        video{
        width:100%;
        height:auto;
        display:block;
        }

    </style>

</head>

<body>

<!-- FIRST VIDEO -->
<div class="section">

    <video autoplay muted playsinline>
        <source src="video1.mp4" type="video/mp4">
    </video>

</div>


<!-- SECOND VIDEO -->
<div class="section">

    <video autoplay muted playsinline>
        <source src="video2.mp4" type="video/mp4">
    </video>

</div>

</body>
</html>
